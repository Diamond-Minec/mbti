    function calculateResult(answers) {
      const dimensionScores = { EI: 0, SN: 0, TF: 0, JP: 0 };
      answers.forEach((answer) => {
        const question = questions.find((q) => q.id === answer.questionId);
        if (!question) return;
        const baseScore = answer.choice;
        const adjustedScore = question.direction === 'positive' ? baseScore : (6 - baseScore);
        dimensionScores[question.dimension] += adjustedScore;
      });
      const dimensions = [
        { dimension: 'EI', score: dimensionScores.EI, type: dimensionScores.EI > 33 ? '外向(E)' : '内向(I)' },
        { dimension: 'SN', score: dimensionScores.SN, type: dimensionScores.SN > 33 ? '感觉(S)' : '直觉(N)' },
        { dimension: 'TF', score: dimensionScores.TF, type: dimensionScores.TF > 33 ? '思考(T)' : '情感(F)' },
        { dimension: 'JP', score: dimensionScores.JP, type: dimensionScores.JP > 33 ? '判断(J)' : '感知(P)' },
      ];
      const type = dimensions.map((d) => d.type.charAt(0)).join('');
      const result = mbtiResults[type] || mbtiResults.INTJ;
      return { ...result, dimensions };
    }

                                ${option === 2 ? 'bg-orange-100 text-orange-500' : ''}
                                ${option === 3 ? 'bg-yellow-100 text-yellow-500' : ''}
                                ${option === 4 ? 'bg-blue-100 text-blue-500' : ''}
                                ${option === 5 ? 'bg-green-100 text-green-500' : ''}`}>
                    {option}
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Quiz({ currentQuestion, currentQuestionIndex, totalQuestions, progress, onSelect }) {
      return (
        <div className="min-h-screen bg-gradient-to-br from-violet-600 via-purple-600 to-pink-500 flex items-center justify-center p-4">
          <div className="max-w-md w-full fade-in">
            <div className="mb-6">
              <div className="flex items-center justify-between text-white/80 text-sm mb-2">
                <span>答题进度</span>
                <span>{Math.round(progress)}%</span>
              </div>
              <div className="h-2 bg-white/20 rounded-full overflow-hidden">
                <div
                  className="h-full bg-white rounded-full transition-all duration-500 ease-out"
                  style={{ width: `${progress}%` }}
                />
              </div>
            </div>
            <QuestionCard
              question={currentQuestion}
              questionNumber={currentQuestionIndex + 1}
              totalQuestions={totalQuestions}
              onSelect={onSelect}
            />
            <p className="text-white/50 text-xs text-center mt-6">
              请根据你的第一反应选择最符合的选项
            </p>
          </div>
        </div>
      );
    }

    function Result({ result, onRestart }) {
      return (
        <div className="min-h-screen bg-gradient-to-br from-violet-600 via-purple-600 to-pink-500 py-8 px-4">
          <div className="max-w-md w-full mx-auto fade-in">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-24 h-24 bg-white/20 backdrop-blur-sm rounded-full mb-4">
                <span className="text-5xl font-bold text-white">{result.type}</span>
              </div>
              <h1 className="text-2xl font-bold text-white mb-2">测试结果</h1>
              <p className="text-white/70 text-sm">你的人格类型</p>
            </div>
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden mb-6">
              <div className="bg-gradient-to-r from-violet-500 to-pink-500 p-4">
                <h2 className="text-white font-semibold">类型分析</h2>
              </div>
              <div className="p-6">
                <p className="text-gray-600 leading-relaxed mb-4">{result.analysis}</p>
                <div className="grid grid-cols-4 gap-2 mb-6">
                  {result.dimensions.map((dim) => (
                    <div key={dim.dimension} className="bg-violet-50 rounded-lg p-3 text-center">
                      <p className="text-violet-600 font-bold text-sm">{dim.type.charAt(0)}</p>
                      <p className="text-gray-500 text-xs">{dim.type.slice(2)}</p>
                    </div>
                  ))}
                </div>
                <div className="mb-6">
                  <h3 className="text-gray-800 font-semibold mb-3">性格维度得分</h3>
                  {result.dimensions.map((dim) => (
                    <div key={dim.dimension} className="mb-3">
                      <div className="flex items-center justify-between text-sm mb-1">
                        <span className="text-gray-600">{dim.type}</span>
                        <span className="text-violet-600 font-medium">{dim.score}/44</span>
                      </div>
                      <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div
                          className="h-full bg-gradient-to-r from-violet-400 to-pink-400 rounded-full"
                          style={{ width: `${(dim.score / 44) * 100}%` }}
                        />
                      </div>
                    </div>
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-4 mb-6">
                  <div className="bg-green-50 rounded-xl p-4">
                    <h3 className="text-green-600 font-semibold text-sm mb-2">优势</h3>
                    <ul className="space-y-1">
                      {result.strengths.slice(0, 4).map((strength, index) => (
                        <li key={index} className="text-gray-600 text-xs flex items-center gap-1">
                          <span className="text-green-500">+</span>
                          {strength}
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div className="bg-orange-50 rounded-xl p-4">
                    <h3 className="text-orange-600 font-semibold text-sm mb-2">待提升</h3>
                    <ul className="space-y-1">
                      {result.weaknesses.slice(0, 4).map((weakness, index) => (
                        <li key={index} className="text-gray-600 text-xs flex items-center gap-1">
                          <span className="text-orange-500">-</span>
                          {weakness}
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
                <div className="mb-6">
                  <h3 className="text-gray-800 font-semibold mb-3">适合的职业</h3>
                  <div className="flex flex-wrap gap-2">
                    {result.careers.slice(0, 6).map((career, index) => (
                      <span
                        key={index}
                        className="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-xs"
                      >
                        {career}
                      </span>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="text-gray-800 font-semibold mb-3">代表人物</h3>
                  <div className="flex flex-wrap gap-2">
                    {result.famousPeople.map((person, index) => (
                      <span
                        key={index}
                        className="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs"
                      >
                        {person}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <button
              onClick={onRestart}
              className="w-full py-4 bg-white text-violet-600 font-semibold rounded-xl
                         hover:bg-violet-50 transition-all duration-300 transform hover:scale-[1.02]
                         shadow-lg shadow-violet-600/30 mb-4"
            >
              重新测试
            </button>
            <p className="text-white/50 text-xs text-center">
              测试结果仅供参考，每个人都是独一无二的
            </p>
          </div>
        </div>
      );
    }

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [result, setResult] = useState(null);

      const startQuiz = useCallback(() => {
        setCurrentPage('quiz');
        setCurrentQuestionIndex(0);
        setAnswers([]);
        setResult(null);
      }, []);

      const goHome = useCallback(() => {
        setCurrentPage('home');
        setCurrentQuestionIndex(0);
        setAnswers([]);
        setResult(null);
      }, []);

      const selectAnswer = useCallback((choice) => {
        const currentQuestion = questions[currentQuestionIndex];
        const newAnswers = [...answers, { questionId: currentQuestion.id, choice }];
        setAnswers(newAnswers);

        if (currentQuestionIndex < questions.length - 1) {
          setCurrentQuestionIndex((prev) => prev + 1);
        } else {
          const calculatedResult = calculateResult(newAnswers);
          setResult(calculatedResult);
          setCurrentPage('result');
        }
      }, [currentQuestionIndex, answers]);

      const currentQuestion = questions[currentQuestionIndex];
      const progress = ((currentQuestionIndex + 1) / questions.length) * 100;

      if (currentPage === 'home') {
        return <Home onStart={startQuiz} />;
      }

      if (currentPage === 'quiz' && currentQuestion) {
        return (
          <Quiz
            currentQuestion={currentQuestion}
            currentQuestionIndex={currentQuestionIndex}
            totalQuestions={questions.length}
            progress={progress}
            onSelect={selectAnswer}
          />
        );
      }

      if (currentPage === 'result' && result) {
        return <Result result={result} onRestart={goHome} />;
      }

      return null;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
